output:
  - meta
  - summary
  - failure

pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,mjs}"
      run: bunx eslint --fix {staged_files}
      stage_fixed: true
    format:
      glob: "*.{ts,json,mjs}"
      run: bunx prettier --write {staged_files}
      stage_fixed: true
    typecheck:
      run: bun run typecheck
    coverage:
      run: bun run test:coverage
    e2e:
      run: bun run test:e2e
    lockfile-up-to-date:
      run: bun install --frozen-lockfile --ignore-scripts
    bundle-up-to-date:
      run: bun run generate:types && git diff --exit-code src/generated/ .clooks/hooks/types.d.ts
    verify-context-examples:
      glob: "{src/examples/**,src/types/contexts.ts}"
      run: bun run scripts/verify-context-examples.ts
