name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

# Third-party actions are pinned to full commit SHAs for supply-chain
# hygiene. Version tags appear in comments alongside each pin. When
# bumping, resolve the new SHA with:
#   gh api repos/<owner>/<repo>/commits/<tag> --jq '.sha'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        # --ignore-scripts skips the `prepare` hook (which runs
        # `lefthook install` for local-dev git hooks). Lefthook is
        # installed via mise locally and is not available on CI runners.
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Generate derived files
        # src/generated/clooks-types.d.ts.txt is imported at runtime by
        # src/commands/init.ts (as a raw text import); src/generated/...
        # schema files are imported by other modules. Both must exist
        # before `bun test` runs, and before typecheck would fail on
        # missing imports. Locally these files persist from prior builds;
        # on a fresh CI checkout they are absent.
        run: |
          bun run scripts/generate-types.ts
          bun run scripts/generate-schema.ts

      - name: Verify version matches tag
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          # package.json is JSON: require() is reliable and synchronous.
          PKG=$(bun -p "require('./package.json').version")
          # src/version.ts is a one-liner: extract with sed (no Bun runtime
          # invocation) to avoid top-level-await reliability issues with -p.
          SRC=$(sed -n "s/^export const VERSION = '\(.*\)'.*/\1/p" src/version.ts)
          if [[ -z "$SRC" ]]; then
            echo "::error::failed to extract VERSION from src/version.ts"
            exit 1
          fi
          if [[ "$PKG" != "$TAG" ]]; then
            echo "::error::package.json version ($PKG) does not match tag ($TAG)"
            exit 1
          fi
          if [[ "$SRC" != "$TAG" ]]; then
            echo "::error::src/version.ts VERSION ($SRC) does not match tag ($TAG)"
            exit 1
          fi
          echo "Tag $TAG matches package.json ($PKG) and src/version.ts ($SRC)"

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun test src/
        env:
          CLAUDECODE: "1"

      - name: Inject version
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          # sed -i with no suffix is GNU-only; safe here because the job
          # pins runs-on: ubuntu-latest. Do NOT port this step to a macOS
          # runner without rewriting (macOS sed requires `sed -i ''`).
          sed -i "s/export const VERSION = '.*'/export const VERSION = '${TAG}'/" src/version.ts
          echo "Injected VERSION=${TAG} into src/version.ts"
          cat src/version.ts

      - name: Build all targets
        run: |
          set -e
          mkdir -p dist
          # Generators already ran in the "Generate derived files" step.
          # set -e does NOT propagate into backgrounded jobs, and a bare
          # `wait` exits 0 even if children failed. Capture PIDs and wait
          # on each individually so a single failed cross-compile fails
          # the step.
          pids=()
          bun build --compile --target bun-darwin-arm64       --outfile dist/clooks-darwin-arm64       src/cli.ts & pids+=($!)
          bun build --compile --target bun-darwin-x64         --outfile dist/clooks-darwin-x64         src/cli.ts & pids+=($!)
          bun build --compile --target bun-linux-x64-modern   --outfile dist/clooks-linux-x64          src/cli.ts & pids+=($!)
          bun build --compile --target bun-linux-x64-baseline --outfile dist/clooks-linux-x64-baseline src/cli.ts & pids+=($!)
          bun build --compile --target bun-linux-arm64        --outfile dist/clooks-linux-arm64        src/cli.ts & pids+=($!)
          fail=0
          for pid in "${pids[@]}"; do
            if ! wait "$pid"; then
              echo "::error::build pid $pid failed"
              fail=1
            fi
          done
          [[ "$fail" -eq 0 ]] || exit 1
          ls -la dist/

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum clooks-* > checksums.txt
          cat checksums.txt

      - name: Upload dist artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: clooks-dist
          path: dist/
          retention-days: 1
          if-no-files-found: error

  sign-and-smoke-darwin:
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: clooks-dist
          path: dist/

      # Signing + notarization only run on tag pushes; workflow_dispatch
      # produces unsigned binaries.
      - name: Import Developer ID signing certificate
        if: github.event_name == 'push'
        uses: apple-actions/import-codesign-certs@b610f78488812c1e56b20e6df63ec42d833f2d14 # v6.0.0
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}

      - name: Sign darwin binaries
        if: github.event_name == 'push'
        env:
          CERT_NAME: ${{ secrets.APPLE_DEVELOPER_ID_CERT_NAME }}
        run: |
          set -e
          # --force replaces Bun's ad-hoc signature. --options runtime
          # and --timestamp are both required by notarization.
          for arch in arm64 x64; do
            binary="dist/clooks-darwin-$arch"
            chmod +x "$binary"
            codesign --force --timestamp --options runtime \
              --sign "$CERT_NAME" \
              "$binary"
            codesign --verify --strict --verbose=2 "$binary"
          done

      - name: Notarize darwin binaries
        if: github.event_name == 'push'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
        run: |
          set -e
          # notarytool requires a container; ditto preserves xattrs better
          # than zip. Bare Mach-O can't be stapled — Gatekeeper fetches
          # the ticket online on first launch.
          for arch in arm64 x64; do
            binary="dist/clooks-darwin-$arch"
            zip_path="dist/clooks-darwin-$arch.zip"
            ditto -c -k --keepParent "$binary" "$zip_path"
            xcrun notarytool submit "$zip_path" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_NOTARY_PASSWORD" \
              --wait
            rm "$zip_path"
          done

      - name: Regenerate checksums after signing
        if: github.event_name == 'push'
        # Signing mutates the binary, so build-job checksums are stale.
        working-directory: dist
        run: |
          sha256sum clooks-* > checksums.txt
          cat checksums.txt

      - name: Smoke test darwin-arm64 binary
        run: |
          set -e
          chmod +x dist/clooks-darwin-arm64
          # Verify the binary runs natively on macOS arm64 and reports a
          # non-empty version. When triggered by a tag push, also check
          # the reported version contains the tag (inject step injected
          # the tag string into src/version.ts before build).
          # macos-latest is arm64. darwin-x64 is NOT smoke-tested here
          # because it requires Rosetta 2 (not installed by default) or
          # a separate macos-13 Intel runner. Accepted v1 limitation.
          OUTPUT=$(./dist/clooks-darwin-arm64 --version)
          echo "darwin-arm64 --version: $OUTPUT"
          if [[ -z "$OUTPUT" ]]; then
            echo "::error::darwin-arm64 binary produced no --version output"
            exit 1
          fi
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            TAG="${GITHUB_REF_NAME#v}"
            if [[ "$OUTPUT" != *"$TAG"* ]]; then
              echo "::error::darwin-arm64 reports '$OUTPUT'; expected to contain '$TAG'"
              exit 1
            fi
          fi
          echo "darwin-arm64 smoke test passed"

      - name: Verify Developer ID signature
        if: github.event_name == 'push'
        run: |
          set -e
          codesign --verify --strict --verbose=2 dist/clooks-darwin-arm64
          codesign --verify --strict --verbose=2 dist/clooks-darwin-x64
          echo "--- Signature details (arm64) ---"
          codesign -dvv dist/clooks-darwin-arm64 2>&1 || true
          echo "--- Signature details (x64) ---"
          codesign -dvv dist/clooks-darwin-x64 2>&1 || true

      - name: Upload final dist artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: clooks-dist-final
          path: dist/
          retention-days: 1
          if-no-files-found: error

  publish:
    needs: [build, sign-and-smoke-darwin]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          # clooks-dist-final contains the signed + notarized darwin
          # binaries plus the untouched linux binaries, and a checksums.txt
          # regenerated after signing so hashes match what ships.
          name: clooks-dist-final
          path: dist/

      - name: Publish draft release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/clooks-*
            dist/checksums.txt
