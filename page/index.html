<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Clooks — TypeScript hooks for AI coding agents</title>
<meta name="description" content="Clooks is a hook runtime for AI coding agents. Write hooks in TypeScript with typed contracts, not bash scripts."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #0a0a0a; color: #f5f5f2; }
  body {
    font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: rgba(251,191,36,0.3); color: #fff; }
  a { color: inherit; }
  h1, h2, h3 { font-family: 'Geist', -apple-system, system-ui, sans-serif; }
  button { font-family: inherit; }
  @keyframes blink { 0%, 49% { opacity: 1 } 50%, 100% { opacity: 0 } }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: #0a0a0a; }
  ::-webkit-scrollbar-thumb { background: #27272a; }
  ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
  button:focus-visible, a:focus-visible, input:focus-visible {
    outline: 1px solid currentColor; outline-offset: 2px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" src="site.jsx"></script>
<script type="text/babel" src="hero.jsx"></script>
<script type="text/babel" src="sections.jsx"></script>

<script type="text/babel">
  function App() {
    const tweaks = TWEAKS;
    return (
      <div>
        <Nav accent={tweaks.accent}/>
        {tweaks.heroVariant === 'split' ? <HeroSplit tweaks={tweaks}/> : <HeroCode tweaks={tweaks}/>}
        <ProblemSection accent={tweaks.accent}/>
        <HookAnatomySection accent={tweaks.accent}/>
        <ConfigSection accent={tweaks.accent}/>
        <CapturesSection accent={tweaks.accent}/>
        <InstallSection accent={tweaks.accent} tweaks={tweaks}/>
        <WhyNotPluginSection accent={tweaks.accent}/>
        <FAQSection accent={tweaks.accent}/>
        <ComparisonSection accent={tweaks.accent}/>
        <Footer accent={tweaks.accent}/>
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App/>);
</script>
</body>
</html>
